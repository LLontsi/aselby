name: Deploy ASELBY

on:
  push:
    branches: [main]

env:
  APP_DIR: /home/root/aselby

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      # ── 1. Créer .env.prod localement puis l'envoyer par scp ──
      # Cette méthode évite tous les problèmes d'échappement SSH
      - name: Create .env.prod locally
        run: |
          cat > /tmp/env.prod << EOF
          SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG=False
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
          DB_NAME=aselby_db
          DB_USER=aselby_user
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=aselby_db
          DB_PORT=5432
          DJANGO_SETTINGS_MODULE=config.settings.prod
          EOF
          # Supprimer les espaces en début de ligne (indentation YAML)
          sed -i 's/^[[:space:]]*//' /tmp/env.prod
          echo "=== Contenu .env.prod (sans secrets) ==="
          grep -v 'SECRET_KEY\|PASSWORD' /tmp/env.prod

      - name: Upload .env.prod to server
        run: |
          scp /tmp/env.prod ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ env.APP_DIR }}/.env.prod

      # ── 2. Copier les fichiers ──────────────────────────────────
      - name: Sync files
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env.prod' \
            --exclude='docker/dump' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ env.APP_DIR }}/

      # ── 3. Déployer ────────────────────────────────────────────
      - name: Deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "
            cd ${{ env.APP_DIR }} && \
            docker compose down && \
            docker compose up -d --build && \
            sleep 5 && \
            docker compose logs --tail=30
          "
